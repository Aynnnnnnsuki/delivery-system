<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>系统管理后台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<!-- 顶部导航 -->
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand mb-0 h1">🛡️ 外卖系统总控台</span>
    <a href="/logout" class="btn btn-outline-light btn-sm">退出系统</a>
</nav>

<div class="container mt-4">

    <!-- 1. 数据统计卡片区域 -->
    <h4 class="mb-3">📊 平台数据监控</h4>
    <div class="row text-center mb-5">
        <div class="col-md-4">
            <div class="card shadow-sm border-primary">
                <div class="card-body">
                    <h5 class="card-title text-primary">总用户数</h5>
                    <p class="display-4 fw-bold" th:text="${totalUsers}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-success">
                <div class="card-body">
                    <h5 class="card-title text-success">总订单量</h5>
                    <p class="display-4 fw-bold" th:text="${totalOrders}">0</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-warning">
                <div class="card-body">
                    <h5 class="card-title text-warning">入驻商家</h5>
                    <p class="display-4 fw-bold" th:text="${totalMerchants}">0</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. 用户管理表格区域 -->
    <h4 class="mb-3">👥 用户治理</h4>
    <div class="card shadow">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>账号</th>
                    <th>角色</th>
                    <th>昵称</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="u : ${users}">
                    <td th:text="${u.userId}"></td>
                    <td th:text="${u.username}"></td>
                    <td>
                        <!-- 根据数字显示不同颜色的标签 -->
                        <span th:if="${u.role == 1}" class="badge bg-warning text-dark">商家</span>
                        <span th:if="${u.role == 2}" class="badge bg-info text-dark">学生</span>
                    </td>
                    <td th:text="${u.name}"></td>
                    <td>
                        <!-- 删除按钮，加个确认弹窗 -->
                        <a th:href="@{/admin/deleteUser(userId=${u.userId})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('确定要注销该用户吗？此操作不可恢复！');">
                            注销账号
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
