<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>我要点餐</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<div class="d-flex justify-content-between">
    <h2>欢迎, <span th:text="${session.user.name}"></span></h2>
    <a href="/logout" class="btn btn-secondary">退出</a>
</div>

<div th:if="${param.success}" class="alert alert-success mt-3">下单成功！</div>

<div class="row mt-4">
    <!-- 循环展示菜品卡片 -->
    <div class="col-md-4 mb-4" th:each="dish : ${dishes}">
        <div class="card h-100 shadow-sm">
            <div class="card-body">
                <h5 class="card-title" th:text="${dish.name}"></h5>
                <p class="card-text text-danger fs-4">¥ <span th:text="${dish.price}"></span></p>
                <p class="card-text text-muted">剩余: <span th:text="${dish.stock}"></span></p>

                <!-- 这是一个外卖表单 -->
                <form action="/student/buy" method="post" class="mt-2">
                    <input type="hidden" name="dishId" th:value="${dish.dishId}">
                    <div class="input-group mb-3">
                        <span class="input-group-text">配送至</span>
                        <input type="text" name="address" class="form-control" placeholder="宿舍号" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">外卖下单</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
