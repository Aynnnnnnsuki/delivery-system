<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>外卖系统登录</title>
    <!-- 使用 Bootstrap 美化 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5" style="max-width: 400px;">
<h3 class="text-center">校园外卖登录</h3>
<form action="/login" method="post" class="card p-4 shadow">
    <div class="mb-3">
        <label>账号</label>
        <input type="text" name="username" class="form-control" placeholder="admin / shop1 / stu1">
    </div>
    <div class="mb-3">
        <label>密码</label>
        <input type="password" name="password" class="form-control" placeholder="123456">
    </div>
    <p class="text-danger" th:text="${msg}"></p>
    <button type="submit" class="btn btn-primary w-100">登录</button>
</form>
</body>
</html>
