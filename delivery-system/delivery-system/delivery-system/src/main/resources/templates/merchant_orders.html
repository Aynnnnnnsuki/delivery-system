<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>外卖调度中心</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
<h2>🍔 商家外卖接单台</h2>
<a href="/merchant/list" class="btn btn-outline-secondary mb-3">返回菜品管理</a>

<table class="table table-striped table-hover">
    <thead class="table-dark">
    <tr>
        <th>订单号</th>
        <th>菜品</th>
        <th>配送地址</th>
        <th>当前状态</th>
        <th>操作 (模拟骑手)</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="order : ${orders}">
        <td th:text="${order.order_id}"></td>
        <td th:text="${order.dish_name}"></td>
        <td th:text="${order.address}" class="text-primary fw-bold"></td>

        <!-- 状态显示逻辑 -->
        <td>
            <span th:if="${order.status == 0}" class="badge bg-warning text-dark">待发货</span>
            <span th:if="${order.status == 1}" class="badge bg-primary">🚴 配送中</span>
            <span th:if="${order.status == 2}" class="badge bg-success">✅ 已送达</span>
        </td>

        <!-- 操作按钮 -->
        <td>
            <a th:if="${order.status == 0}"
               th:href="@{/merchant/updateStatus(orderId=${order.order_id}, status=1)}"
               class="btn btn-sm btn-primary">立即发货</a>

            <a th:if="${order.status == 1}"
               th:href="@{/merchant/updateStatus(orderId=${order.order_id}, status=2)}"
               class="btn btn-sm btn-success">确认送达</a>

            <span th:if="${order.status == 2}" class="text-muted">订单结束</span>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
